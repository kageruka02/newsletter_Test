name: Selenium Tests

# Trigger on push or pull request to main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:

      # Step 1 — Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3 — Cache Maven dependencies (speeds up subsequent runs)
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # Step 4 — Install Chrome browser on the Ubuntu runner
      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      # Step 5 — Run tests in headless mode (no display on server)
      - name: Run Selenium Tests
        run: mvn test -Dheadless=true

      # Step 6 — Upload TestNG report as artifact (visible in GitHub Actions)
      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always() # upload even if tests fail
        with:
          name: testng-reports
          path: ./target/surefire-reports/

      # Step 7 — Send email notification on failure
      - name: Send failure notification
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ Newsletter Tests FAILED — ${{ github.repository }}"
          body: |
            Selenium tests failed on branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Triggered by: ${{ github.actor }}
            
            Check the run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: GitHub Actions

      # Step 8 — Send success notification
      - name: Send success notification
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ Newsletter Tests PASSED — ${{ github.repository }}"
          body: |
            All Selenium tests passed on branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Triggered by: ${{ github.actor }}
            
            Check the run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: GitHub Actions
